version: '3.8'

services:
  landing:
    image: node:20-alpine
    working_dir: /app
    command: npx --yes serve@14.2.0 -l 3001 .
    ports:
      - "3001:3001"
    volumes:
      - ./apps/landing:/app

  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./apps/admin:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - api

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    environment:
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/pilates?schema=public
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=pilates
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
